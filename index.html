<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coco Assistant | AI Powered</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .chat-box { height: 400px; overflow-y: auto; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-2xl mb-8 text-center">
        <h1 class="text-4xl font-bold tracking-tight text-blue-400">COCO <span class="text-white">ASSISTANT</span></h1>
        <p class="text-slate-400 mt-2">Advanced Intelligence Interface v2.0</p>
    </div>

    <div class="w-full max-w-2xl glass rounded-2xl p-6 shadow-2xl">
        
        <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-4">
            <span id="status" class="text-xs uppercase tracking-widest text-red-400">● Offline (Add Key)</span>
            <button onclick="toggleSettings()" class="text-slate-400 hover:text-white transition">⚙️ Settings</button>
        </div>

        <div id="chatBox" class="chat-box mb-6 flex flex-col gap-4 p-2">
            <div class="bg-blue-600/20 p-3 rounded-lg self-start max-w-[80%]">
                Hello Coco. I am your advanced neural assistant. How can I optimize your workflow today?
            </div>
        </div>

        <div class="flex gap-2">
            <input type="text" id="userInput" placeholder="Type a command..." 
                   class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 transition">
            <button onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-lg font-semibold transition">Send</button>
        </div>
    </div>

    <div id="settingsModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4">
        <div class="glass p-8 rounded-xl w-full max-w-md">
            <h2 class="text-xl font-bold mb-4">AI Configuration</h2>
            <p class="text-sm text-slate-400 mb-4">Enter your OpenAI API Key. This is saved locally in your browser and never sent to our servers.</p>
            <input type="password" id="apiKey" placeholder="sk-..." class="w-full bg-slate-800 p-3 rounded mb-4 border border-slate-700">
            <div class="flex gap-2">
                <button onclick="saveKey()" class="flex-1 bg-green-600 p-2 rounded font-bold">Save Key</button>
                <button onclick="toggleSettings()" class="flex-1 bg-slate-700 p-2 rounded">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let chatHistory = [];

        function toggleSettings() {
            const modal = document.getElementById('settingsModal');
            modal.classList.toggle('hidden');
        }

        function saveKey() {
            const key = document.getElementById('apiKey').value;
            localStorage.setItem('coco_api_key', key);
            document.getElementById('status').innerText = "● Ready";
            document.getElementById('status').classList.replace('text-red-400', 'text-green-400');
            toggleSettings();
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            const apiKey = localStorage.getItem('coco_api_key');

            if (!apiKey) return alert("Please add your API key in Settings first!");
            if (!input.value.trim()) return;

            const userText = input.value;
            input.value = '';

            // Add User Bubble
            chatBox.innerHTML += `<div class="bg-slate-700 p-3 rounded-lg self-end max-w-[80%]">${userText}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "gpt-4",
                        messages: [{role: "user", content: userText}]
                    })
                });

                const data = await response.json();
                const aiText = data.choices[0].message.content;

                // Add AI Bubble
                chatBox.innerHTML += `<div class="bg-blue-600/20 p-3 rounded-lg self-start max-w-[80%]">${aiText}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (error) {
                chatBox.innerHTML += `<div class="text-red-400 text-xs">Error: Could not connect to AI. Check your key.</div>`;
            }
        }

        // Initialize status on load
        if(localStorage.getItem('coco_api_key')) {
            document.getElementById('status').innerText = "● Ready";
            document.getElementById('status').classList.replace('text-red-400', 'text-green-400');
        }
    </script>
</body>
</html>
